<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card-hover</title>
    <style>
        *{
            margin: 0px;
            padding: 0px;
            box-sizing: border-box;
        }

        body{
            height: 720px;
            width: 100%;
            background-color: aliceblue;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card{
            height: 300px;
            width: 300px;
            background: white;
            font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
            padding: 35px;
            font-size: 22px;
            border-radius: 15px;
            box-shadow:0 5px 15px rgba(0,0,0,0.2);
            transition: ease-in 0.8s;
            cursor: pointer;
        }

        .card h3{
            text-align: center;
            margin-bottom: 25px;
        }

        .card:hover{
            background: rgb(183, 220, 95);
            transform:translateY(-10px) scale(1.03);
        }
    </style>
</head>
<body>
    <div class="card">
        <h3>Pokemon</h3>
        <p>Pikachu is an Electric-type Pokémon known for its cute appearance
        and powerful electric attacks. It is one of the most popular Pokémon
        in the world.</p>
    </div>
</body>
</html>
